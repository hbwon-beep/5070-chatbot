<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5070 챗봇 테스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Noto Sans KR', sans-serif;
      background: #e8edf6;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
    }
    .chat-wrap {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column;
      height: 720px; border-radius: 28px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(9,40,90,0.16), 0 4px 16px rgba(0,0,0,0.06);
      background: #f5f7fb;
    }
    .header {
      background: #09285a; padding: 16px 20px;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .header-icon {
      width: 40px; height: 40px; background: rgba(255,255,255,0.12);
      border-radius: 14px; display: flex; align-items: center;
      justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .header-title { font-size: 14px; font-weight: 700; color: #fff; }
    .header-sub { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .header-badge {
      margin-left: auto; background: rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.85); font-size: 10px; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
    }
    .online-dot {
      width: 6px; height: 6px; background: #4ade80; border-radius: 50%;
      display: inline-block; margin-right: 5px; vertical-align: middle;
    }
    .notice {
      background: #eef2fb; padding: 7px 16px;
      font-size: 11px; color: #8a96b0; text-align: center;
      border-bottom: 1px solid #e4e9f4; flex-shrink: 0;
    }
    .messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #d0d8e8; border-radius: 4px; }
    .msg-group { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .msg-group.user { align-items: flex-end; }
    .msg-group.bot { align-items: flex-start; }
    .msg {
      max-width: 80%; font-size: 14px; line-height: 1.65;
      word-break: break-word; padding: 10px 14px;
    }
    .msg-group.bot .msg {
      background: #fff; color: #1a2340;
      border-radius: 4px 18px 18px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .msg-group.user .msg {
      background: #09285a; color: #fff;
      border-radius: 18px 4px 18px 18px;
    }
    /* 링크 스타일 */
    .msg a {
      color: #3a7bd5; text-decoration: underline;
      word-break: break-all;
    }
    .msg-group.user .msg a { color: #a8d0ff; }
    /* 타이핑 */
    .typing-dots { display: flex; gap: 4px; padding: 2px 0; }
    .typing-dots span {
      width: 7px; height: 7px; background: #c5cee0; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
    /* 빠른 답변 */
    .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; margin-bottom: 6px; }
    .quick-btn {
      font-size: 12.5px; padding: 6px 13px; border-radius: 20px;
      border: 1.5px solid #c8d3ea; color: #3a5a9a; background: #fff;
      cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit;
    }
    .quick-btn:hover { background: #09285a; color: #fff; border-color: #09285a; }
    /* 선택 버튼 (구직자/기업) */
    .role-btns { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .role-btn {
      flex: 1; min-width: 120px; padding: 10px 14px; border-radius: 12px;
      border: 2px solid #09285a; color: #09285a; background: #fff;
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: all 0.15s; font-family: inherit; text-align: center;
    }
    .role-btn:hover { background: #09285a; color: #fff; }
    /* 입력창 */
    .input-area {
      padding: 12px 14px; background: #fff;
      border-top: 1px solid #eaeef6;
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    textarea {
      flex: 1; border: 1.5px solid #e2e8f4; border-radius: 20px;
      padding: 10px 16px; font-size: 14px; resize: none; outline: none;
      max-height: 100px; min-height: 42px; line-height: 1.4;
      font-family: inherit; color: #1a2340; background: #f8faff;
      transition: border-color 0.2s, background 0.2s;
    }
    textarea:focus { border-color: #09285a; background: #fff; }
    textarea::placeholder { color: #aab4cc; }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%; background: #09285a;
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: #0d3878; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: #c8d0e0; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: white; margin-left: 1px; }
  </style>
</head>
<body>
<div class="chat-wrap">
  <div class="header">
    <div class="header-icon">💼</div>
    <div>
      <div class="header-title">경기도 5070 일자리박람회 AI</div>
      <div class="header-sub"><span class="online-dot"></span>일정 · 참여기업 · 채용정보 안내</div>
    </div>
    <div class="header-badge">테스트</div>
  </div>
  <div class="notice">개인정보(이름, 연락처 등)는 입력하지 마세요</div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" placeholder="궁금한 점을 물어보세요..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()" id="sendBtn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const API_URL = 'https://5070-chatbot.vercel.app/api/chat';
  const QUICK_REPLIES_JOBSEEKER = ['참가비가 있나요?', '사전신청 방법', '이력서 필요한가요?', '운영사무국 연락처'];
  const QUICK_REPLIES_COMPANY = ['기업 참가비가 있나요?', '부스 신청 방법', '부스 구성이 어떻게 되나요?', '기업 담당 연락처'];
  const SESSION_ID = 'test_' + Date.now();
  let messages = [];
  let isLoading = false;
  let userRole = null; // 'jobseeker' | 'company'

  window.onload = () => {
    addBotMessage('안녕하세요! 😊 경기도 5070 일자리박람회입니다.\n혹시 어떤 목적으로 방문하셨나요?', false, true);
  };

  function linkify(text) {
    const escaped = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    return escaped.replace(/(https?:\/\/[^\s]+|www\.[^\s]+|job5070\.imweb\.me[^\s]*)/g, (url) => {
      const href = url.startsWith('http') ? url : 'https://' + url;
      return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
  }

  function addBotMessage(text, showQuick = false, showRoleBtns = false) {
    const container = document.getElementById('messages');
    const group = document.createElement('div');
    group.className = 'msg-group bot';
    const div = document.createElement('div');
    div.className = 'msg';
    div.style.whiteSpace = 'pre-line';
    div.innerHTML = linkify(text);
    group.appendChild(div);
    container.appendChild(group);

    if (showRoleBtns) {
      const rb = document.createElement('div');
      rb.className = 'role-btns';
      rb.id = 'role-btns';
      [['jobseeker', '구직자로 참여합니다'], ['company', '기업 담당자입니다']].forEach(([role, label]) => {
        const btn = document.createElement('button');
        btn.className = 'role-btn';
        btn.textContent = label;
        btn.onclick = () => selectRole(role, label, rb);
        rb.appendChild(btn);
      });
      container.appendChild(rb);
    }

    if (showQuick) {
      const qr = document.createElement('div');
      qr.className = 'quick-replies';
      const replies = userRole === 'company' ? QUICK_REPLIES_COMPANY : QUICK_REPLIES_JOBSEEKER;
      replies.forEach(label => {
        const btn = document.createElement('button');
        btn.className = 'quick-btn';
        btn.textContent = label;
        btn.onclick = () => { qr.remove(); sendUserMessage(label); };
        qr.appendChild(btn);
      });
      container.appendChild(qr);
    }
    container.scrollTop = container.scrollHeight;
  }

  function selectRole(role, label, rbEl) {
    userRole = role;
    rbEl.remove();
    addUserMessage(label);
    messages.push({ role: 'user', content: label });
    const reply = role === 'jobseeker'
      ? '구직자로 방문하셨군요! 일정, 참여기업, 신청 방법 등 무엇이든 물어보세요 😊'
      : '기업 담당자시군요! 부스 신청, 운영 안내 등 궁금한 점을 물어보세요 😊';
    addBotMessage(reply, true);
    messages.push({ role: 'assistant', content: reply });
  }

  function addUserMessage(text) {
    const container = document.getElementById('messages');
    const group = document.createElement('div');
    group.className = 'msg-group user';
    const div = document.createElement('div');
    div.className = 'msg';
    div.textContent = text;
    group.appendChild(div);
    container.appendChild(group);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const group = document.createElement('div');
    group.className = 'msg-group bot';
    group.id = 'typing';
    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    group.appendChild(div);
    container.appendChild(group);
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function sendUserMessage(text) {
    if (isLoading || !text.trim()) return;
    isLoading = true;
    addUserMessage(text);
    messages.push({ role: 'user', content: text });
    document.getElementById('sendBtn').disabled = true;
    showTyping();
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, sessionId: SESSION_ID }),
      });
      const data = await res.json();
      const reply = data.reply || data.error || '오류가 발생했습니다.';
      hideTyping();
      addBotMessage(reply);
      messages.push({ role: 'assistant', content: reply });
    } catch (e) {
      hideTyping();
      addBotMessage('연결에 문제가 생겼습니다.\n운영사무국(1660-3352)으로 문의해 주세요.');
    }
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    autoResize(input);
    sendUserMessage(text);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>
</body>
</html>
