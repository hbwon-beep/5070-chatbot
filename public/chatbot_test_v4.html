<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>5070 일자리박람회 AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: #EBF3FF;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .chat-wrap {
      width: 100%; max-width: 420px;
      height: calc(100dvh - 40px); max-height: 760px;
      background: #fff;
      border-radius: 24px;
      border: 1px solid #D6E6FF;
      box-shadow: 0 8px 40px rgba(37, 99, 235, 0.10);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ───────────────────────── */
    .header {
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid #EBF3FF;
    }
    .avatar {
      width: 40px; height: 40px; flex-shrink: 0;
      background: #EBF3FF;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-info { flex: 1; }
    .header-title { font-size: 14px; font-weight: 600; color: #0F1C2E; }
    .header-sub {
      font-size: 11px; color: #94A3B8; margin-top: 2px;
      display: flex; align-items: center; gap: 5px;
    }
    .status-dot {
      width: 5px; height: 5px; background: #22C55E;
      border-radius: 50%; flex-shrink: 0;
    }
    .header-badge {
      font-size: 10px; font-weight: 600;
      background: #EBF3FF; color: #2563EB;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid #BFDBFE;
      flex-shrink: 0;
    }

    /* ── 공지 ───────────────────────── */
    .notice {
      padding: 7px 18px;
      font-size: 11px; color: #94A3B8;
      text-align: center; flex-shrink: 0;
      border-bottom: 1px solid #F1F5F9;
    }

    /* ── 고정 칩바 ─────────────────── */
    .pinned-chips-wrap {
      position: relative; flex-shrink: 0;
      display: none;
      background: #fff;
      border-bottom: 1px solid #F1F5F9;
      align-items: center;
    }
    .pinned-chips-wrap.show { display: flex; }
    .chip-arrow {
      width: 26px; height: 100%; flex-shrink: 0;
      background: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #94A3B8; font-size: 16px; padding: 0;
      transition: color 0.15s;
    }
    .chip-arrow:hover { color: #2563EB; }
    .chip-arrow.hidden { visibility: hidden; pointer-events: none; }
    .chip-arrow-left  { box-shadow:  4px 0 6px #fff; z-index: 1; }
    .chip-arrow-right { box-shadow: -4px 0 6px #fff; z-index: 1; }
    .pinned-chips {
      flex: 1; padding: 9px 0;
      display: flex; flex-wrap: nowrap;
      overflow-x: auto; gap: 6px;
      scrollbar-width: none; scroll-behavior: smooth;
    }
    .pinned-chips::-webkit-scrollbar { display: none; }
    .pinned-chip {
      font-size: 12px; padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #BFDBFE;
      color: #2563EB; background: #EBF3FF;
      cursor: pointer; font-family: inherit;
      font-weight: 500; white-space: nowrap;
      transition: all 0.12s; flex-shrink: 0;
    }
    .pinned-chip:hover {
      background: #2563EB; color: #fff;
      border-color: #2563EB;
    }

    /* ── 메시지 ─────────────────────── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 20px 16px 24px;
      display: flex; flex-direction: column; gap: 0;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #BFDBFE; border-radius: 3px; }

    .msg-group {
      display: flex; flex-direction: column;
      margin-bottom: 12px;
      animation: msgIn 0.18s ease-out both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-group.user { align-items: flex-end; }
    .msg-group.bot  { align-items: flex-start; }

    .bot-row { display: flex; align-items: flex-end; gap: 8px; }
    .bot-icon {
      width: 28px; height: 28px; flex-shrink: 0;
      background: #EBF3FF; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; margin-bottom: 2px;
    }
    .msg {
      max-width: 78%; font-size: 14px; line-height: 1.7;
      word-break: keep-all; padding: 10px 14px;
      border-radius: 16px;
    }
    .msg-group.bot .msg {
      background: #F8FAFC;
      color: #0F1C2E;
      border-radius: 4px 16px 16px 16px;
      border: 1px solid #E8F0FE;
    }
    .msg-group.user .msg {
      background: #2563EB;
      color: #fff;
      border-radius: 16px 4px 16px 16px;
    }
    .msg a {
      color: #2563EB; text-decoration: underline;
      text-underline-offset: 2px; display: inline-block;
    }
    .msg-group.user .msg a { color: #BFDBFE; }

    /* ── 역할 선택 ──────────────────── */
    .role-btns {
      display: flex; gap: 8px; margin-top: 8px;
      padding-left: 36px;
    }
    .role-btn {
      flex: 1; padding: 12px 10px; border-radius: 12px;
      background: #F8FAFC; border: 1px solid #E2E8F0;
      color: #0F1C2E; font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: center; font-family: inherit;
      transition: all 0.12s; line-height: 1.4;
    }
    .role-btn:hover {
      background: #2563EB; color: #fff;
      border-color: #2563EB;
    }
    .role-btn .btn-icon { font-size: 20px; display: block; margin-bottom: 5px; }

    /* ── 타이핑 ─────────────────────── */
    .typing-dots { display: flex; gap: 4px; padding: 1px 0; }
    .typing-dots span {
      width: 6px; height: 6px; background: #CBD5E1;
      border-radius: 50%; animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

    /* ── 알림 배너 ──────────────────── */
    .alert-banner {
      margin: 0 14px 8px; padding: 10px 14px;
      background: #FFFBEB; border: 1px solid #FDE68A;
      border-radius: 10px; font-size: 12.5px; color: #78350F;
      display: none; flex-shrink: 0; line-height: 1.6;
    }
    .alert-banner.show { display: block; }

    /* ── 입력 ───────────────────────── */
    .input-area {
      padding: 12px 14px 14px; background: #fff;
      border-top: 1px solid #F1F5F9;
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    textarea {
      flex: 1; background: #F8FAFC;
      border: 1px solid #E2E8F0; border-radius: 16px;
      padding: 10px 14px; font-size: 14px;
      resize: none; outline: none; overflow: hidden;
      -webkit-appearance: none; appearance: none;
      max-height: 100px; min-height: 42px;
      line-height: 1.5; font-family: inherit; color: #0F1C2E;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #93C5FD; background: #fff; }
    textarea::placeholder { color: #CBD5E1; }
    .send-btn {
      width: 42px; height: 42px; flex-shrink: 0;
      background: #2563EB; border: none; border-radius: 50%;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: #1D4ED8; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: #BFDBFE; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; margin-left: 1px; }
  </style>
</head>
<body>
<div class="chat-wrap">
  <div class="header">
    <div class="avatar">✨</div>
    <div class="header-info">
      <div class="header-title">경기도 5070 일자리박람회 AI</div>
      <div class="header-sub">
        <span class="status-dot"></span>
        일정 · 참여기업 · 채용정보 안내
      </div>
    </div>
    <div class="header-badge">테스트</div>
  </div>

  <div class="notice">🔒 개인정보(이름, 연락처 등)는 입력하지 마세요</div>

  <div class="pinned-chips-wrap" id="pinnedChipsWrap">
    <button class="chip-arrow chip-arrow-left hidden" id="chipLeft" onclick="scrollChips(-1)">&#8249;</button>
    <div class="pinned-chips" id="pinnedChips"></div>
    <button class="chip-arrow chip-arrow-right hidden" id="chipRight" onclick="scrollChips(1)">&#8250;</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="alert-banner" id="alertBanner">
    ⚠️ 담당자 연결이 필요해 보입니다. 운영사무국으로 연락해 주세요.<br>
    구직자: <strong>1660-3352</strong> · 기업: <strong>070-4420-6642</strong>
    <span style="opacity:.6"> (평일 10:00~18:00)</span>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="궁금한 점을 물어보세요..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()" id="sendBtn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const API_URL = 'https://5070-chatbot.vercel.app/api/chat';
  const QUICK_REPLIES_JOBSEEKER = ['📅 박람회 일정 알려줘', '📝 구직자 신청 방법', '🏢 참여기업 보고 싶어', '📞 운영사무국 연락처'];
  const QUICK_REPLIES_COMPANY   = ['📅 박람회 일정 알려줘', '📋 기업 참가 신청 방법', '🪑 부스 구성 안내', '📞 기업 담당 연락처'];
  const SESSION_ID = 'test_' + Date.now();
  let messages  = [];
  let isLoading = false;
  let userRole  = null;

  window.onload = () => {
    addBotMessage('안녕하세요! 😊 경기도 5070 일자리박람회입니다.\n혹시 어떤 목적으로 방문하셨나요?', false, true);
  };

  function scrollToBottom() {
    const el = document.getElementById('messages');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.scrollTop = el.scrollHeight;
    }));
  }

  function linkify(text) {
    return text.split('\n').map(line => {
      const trimmed = line.trim();
      if (/^(https?:\/\/|www\.)\S+$/.test(trimmed)) {
        const href = trimmed.startsWith('http') ? trimmed : 'https://' + trimmed;
        return `<a href="${href}" target="_blank" rel="noopener noreferrer">${trimmed}</a>`;
      }
      return line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }).join('\n');
  }

  function addBotMessage(text, showQuick = false, showRoleBtns = false) {
    const container = document.getElementById('messages');
    const group = document.createElement('div');
    group.className = 'msg-group bot';
    const row = document.createElement('div');
    row.className = 'bot-row';
    const icon = document.createElement('div');
    icon.className = 'bot-icon';
    icon.textContent = '✨';
    const div = document.createElement('div');
    div.className = 'msg';
    div.style.whiteSpace = 'pre-line';
    div.innerHTML = linkify(text);
    row.appendChild(icon);
    row.appendChild(div);
    group.appendChild(row);
    container.appendChild(group);

    if (showRoleBtns) {
      const rb = document.createElement('div');
      rb.className = 'role-btns';
      rb.id = 'role-btns';
      [['jobseeker','👤','구직자로 참여합니다'], ['company','🏢','기업 담당자입니다']].forEach(([role, ic, label]) => {
        const btn = document.createElement('button');
        btn.className = 'role-btn';
        btn.innerHTML = `<span class="btn-icon">${ic}</span>${label}`;
        btn.onclick = () => selectRole(role, label, rb);
        rb.appendChild(btn);
      });
      container.appendChild(rb);
    }
    scrollToBottom();
  }

  function selectRole(role, label, rbEl) {
    userRole = role;
    rbEl.remove();
    addUserMessage(label);
    messages.push({ role: 'user', content: label });
    const reply = role === 'jobseeker'
      ? '구직자로 방문하셨군요! 일정, 참여기업, 신청 방법 등 무엇이든 물어보세요 😊'
      : '기업 담당자시군요! 부스 신청, 운영 안내 등 궁금한 점을 물어보세요 😊';
    addBotMessage(reply);
    messages.push({ role: 'assistant', content: reply });
    showPinnedChips();
  }

  function showPinnedChips() {
    const wrap = document.getElementById('pinnedChips');
    const chips = userRole === 'company' ? QUICK_REPLIES_COMPANY : QUICK_REPLIES_JOBSEEKER;
    wrap.innerHTML = '';
    chips.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'pinned-chip';
      btn.textContent = label;
      btn.onclick = () => sendUserMessage(label);
      wrap.appendChild(btn);
    });
    document.getElementById('pinnedChipsWrap').classList.add('show');
    wrap.addEventListener('scroll', updateArrows);
    setTimeout(updateArrows, 50);
  }

  function scrollChips(dir) {
    document.getElementById('pinnedChips').scrollBy({ left: dir * 140, behavior: 'smooth' });
  }

  function updateArrows() {
    const el = document.getElementById('pinnedChips');
    const atStart = el.scrollLeft <= 4;
    const atEnd = el.scrollLeft + el.clientWidth >= el.scrollWidth - 4;
    document.getElementById('chipLeft').classList.toggle('hidden', atStart);
    document.getElementById('chipRight').classList.toggle('hidden', atEnd);
  }

  function addUserMessage(text) {
    const container = document.getElementById('messages');
    const group = document.createElement('div');
    group.className = 'msg-group user';
    const div = document.createElement('div');
    div.className = 'msg';
    div.textContent = text;
    group.appendChild(div);
    container.appendChild(group);
    scrollToBottom();
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const group = document.createElement('div');
    group.className = 'msg-group bot';
    group.id = 'typing';
    const row = document.createElement('div');
    row.className = 'bot-row';
    const icon = document.createElement('div');
    icon.className = 'bot-icon';
    icon.textContent = '✨';
    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    row.appendChild(icon);
    row.appendChild(div);
    group.appendChild(row);
    container.appendChild(group);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function sendUserMessage(text) {
    if (isLoading || !text.trim()) return;
    isLoading = true;
    addUserMessage(text);
    messages.push({ role: 'user', content: text });
    document.getElementById('sendBtn').disabled = true;
    showTyping();
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, role: userRole, sessionId: SESSION_ID }),
      });
      const data = await res.json();
      const reply = data.reply || data.error || '오류가 발생했습니다.';
      hideTyping();
      addBotMessage(reply);
      messages.push({ role: 'assistant', content: reply });
      if (data.needsAlert) document.getElementById('alertBanner').classList.add('show');
    } catch (e) {
      hideTyping();
      addBotMessage('연결에 문제가 생겼습니다.\n운영사무국(1660-3352)으로 문의해 주세요.');
    }
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    autoResize(input);
    sendUserMessage(text);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>
</body>
</html>
